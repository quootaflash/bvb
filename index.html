<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lamaran Kerja via Email</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: #f8fafc;
            color: #1f2937;
        }

        .email-container {
            max-width: 720px;
            margin: 30px auto;
            background: white;
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.1);
            padding: 24px 32px;
            line-height: 1.7;
        }

        .form-section {
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .form-section:last-child {
            border-bottom: none;
        }

        .form-control {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid #d1d5db;
            border-radius: 0.75rem;
            outline: none;
            font-size: 0.95rem;
        }

        .form-control:focus {
            border-color: #059669;
            box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.1);
        }

        .form-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            color: #4b5563;
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .email-preview {
            white-space: pre-line;
            word-wrap: break-word;
            font-family: ui-monospace, SFMono-Regular, monospace;
            font-size: 0.92rem;
        }

        .preview-header {
            margin-bottom: 1rem;
            padding-left: 0.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            color: #374151;
        }

        .no-print {
            display: block;
        }

        @media print {
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="bg-slate-50 font-sans">

    <!-- NAVBAR -->
    <nav class="bg-slate-900 text-white sticky top-0 z-50 shadow-md">
        <div class="max-w-screen-2xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <i class="fa-solid fa-envelope text-3xl text-emerald-400"></i>
                <div>
                    <h1 class="text-xl font-semibold tracking-tight">LAMARAN VIA EMAIL</h1>
                    <p class="text-xs text-slate-300 -mt-0.5">Surat Lamaran Kerja Format Email v1.0</p>
                </div>
            </div>
            
            <div class="flex items-center gap-x-3 text-sm">
                <button onclick="autoSaveDraft()" class="flex items-center gap-x-2 px-5 h-10 bg-white/10 hover:bg-white/20 rounded-xl font-medium">
                    <i class="fa-solid fa-floppy-disk"></i> <span class="hidden md:inline">Simpan Draft</span>
                </button>
                <button onclick="copyEmail()" class="flex items-center gap-x-2 px-6 h-10 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl font-medium">
                    <i class="fa-solid fa-copy"></i> <span>Salin Email</span>
                </button>
                <button onclick="clearForm()" class="flex items-center justify-center w-10 h-10 text-red-400 hover:text-red-300 rounded-xl">
                    <i class="fa-solid fa-trash text-xl"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-screen-2xl mx-auto px-6 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- FORM INPUT -->
            <div class="lg:col-span-5 bg-white rounded-3xl shadow-xl p-8 no-print">
                <div class="mb-8">
                    <h2 class="text-xl font-semibold text-slate-800">Lengkapi Data Anda</h2>
                    <p class="text-emerald-600 text-sm mt-1">Isi formulir, lalu salin email yang dihasilkan ke Outlook/Gmail</p>
                </div>

                <div class="space-y-6">
                    <!-- Data Diri -->
                    <div class="form-section">
                        <h3 class="uppercase text-xs tracking-widest font-medium text-slate-500 mb-4">Data Diri Pelamar</h3>
                        
                        <div class="space-y-3">
                            <div>
                                <label class="form-label">Nama Lengkap</label>
                                <input id="nama" type="text" value="Muhammad Hafis" placeholder="Nama Lengkap" 
                                       class="form-control" oninput="updateEmail()">
                            </div>
                            <div class="grid-2">
                                <div>
                                    <label class="form-label">Tempat Lahir</label>
                                    <input id="tempat_lahir" type="text" value="Pekalongan" placeholder="Tempat Lahir" 
                                           class="form-control" oninput="updateEmail()">
                                </div>
                                <div>
                                    <label class="form-label">Tanggal Lahir</label>
                                    <input id="tanggal_lahir" type="text" value="15 Mei 2005" placeholder="Tanggal Lahir" 
                                           class="form-control" oninput="updateEmail()">
                                </div>
                            </div>
                            <div class="grid-2">
                                <div>
                                    <label class="form-label">Jenis Kelamin</label>
                                    <select id="jenis_kelamin" class="form-control" onchange="updateEmail()">
                                        <option value="Laki-laki">Laki-laki</option>
                                        <option value="Perempuan" selected>Perempuan</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="form-label">Alamat</label>
                                    <input id="alamat" type="text" value="Paninggaran, Pekalongan, Jawa Tengah" placeholder="Alamat Lengkap" 
                                           class="form-control" oninput="updateEmail()">
                                </div>
                            </div>
                            <div class="grid-2">
                                <div>
                                    <label class="form-label">No. Telepon</label>
                                    <input id="telepon" type="tel" value="0856-1234-5678" placeholder="No. Telepon / HP" 
                                           class="form-control" oninput="updateEmail()">
                                </div>
                                <div>
                                    <label class="form-label">Email</label>
                                    <input id="email" type="email" value="hafis@example.com" placeholder="Email" 
                                           class="form-control" oninput="updateEmail()">
                                </div>
                            </div>
                            <div>
                                <label class="form-label">Pendidikan Terakhir</label>
                                <input id="pendidikan" type="text" value="SMK Nurul Ummah Paninggaran, Jurusan Teknik Jaringan Komputer dan Telekomunikasi, Lulus 2026" 
                                       placeholder="Pendidikan Terakhir" 
                                       class="form-control" oninput="updateEmail()">
                            </div>
                        </div>
                    </div>

                    <!-- Perusahaan & Posisi -->
                    <div class="form-section">
                        <h3 class="uppercase text-xs tracking-widest font-medium text-slate-500 mb-2">Perusahaan & Posisi</h3>
                        <div class="space-y-3">
                            <div>
                                <label class="form-label">Nama Perusahaan</label>
                                <input id="nama_perusahaan" type="text" value="PT. Teknologi Digital Indonesia" placeholder="Nama Perusahaan" 
                                       class="form-control" oninput="updateEmail()">
                            </div>
                            <div class="grid-2">
                                <div>
                                    <label class="form-label">Posisi yang Dilamar</label>
                                    <input id="posisi" type="text" value="IT Support" placeholder="Posisi yang Dilamar" 
                                           class="form-control" oninput="updateEmail()">
                                </div>
                                <div>
                                    <label class="form-label">Sumber Lowongan</label>
                                    <input id="sumber_lowongan" type="text" value="website perusahaan" placeholder="Website / LinkedIn / dll." 
                                           class="form-control" oninput="updateEmail()">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Lampiran -->
                    <div class="form-section">
                        <h3 class="uppercase text-xs tracking-widest font-medium text-slate-500 mb-2">Lampiran Email</h3>
                        <textarea id="lampiran" rows="5" class="form-control" 
                                  oninput="updateEmail()">1. Curriculum Vitae (CV)
2. Fotokopi Ijazah
3. Fotokopi Transkrip Nilai
4. Pas Foto 3x4</textarea>
                    </div>
                </div>
            </div>

            <!-- PREVIEW EMAIL -->
            <div class="lg:col-span-7">
                <div class="preview-header">
                    <i class="fa-solid fa-envelope"></i> Pratinjau Email Lamaran
                </div>
                
                <div class="bg-white p-6 rounded-xl shadow-inner overflow-x-auto">
                    <div id="email-preview" class="email-container email-preview"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function updateEmail() {
            const nama = document.getElementById('nama').value || "Nama Lengkap";
            const tempat_lahir = document.getElementById('tempat_lahir').value || "Pekalongan";
            const tanggal_lahir = document.getElementById('tanggal_lahir').value || "15 Mei 2005";
            const jenis_kelamin = document.getElementById('jenis_kelamin').value;
            const alamat = document.getElementById('alamat').value || "Alamat Lengkap";
            const telepon = document.getElementById('telepon').value || "0812-0000-0000";
            const email = document.getElementById('email').value || "email@example.com";
            const pendidikan = document.getElementById('pendidikan').value || "Pendidikan Terakhir";

            const nama_perusahaan = document.getElementById('nama_perusahaan').value || "PT. Teknologi Digital Indonesia";
            const posisi = document.getElementById('posisi').value || "IT Support";
            const sumber_lowongan = document.getElementById('sumber_lowongan').value || "website perusahaan";

            const lampiran = document.getElementById('lampiran').value || "1. Curriculum Vitae (CV)
2. Fotokopi Ijazah
3. Fotokopi Transkrip Nilai
4. Pas Foto 3x4";

            const body = 
`Yth. Tim Rekrutmen HRD
${nama_perusahaan}

Dengan hormat,

Perkenalkan, saya ${nama}, lulusan dari ${pendidikan}. Melalui email ini saya ingin mengajukan lamaran kerja untuk posisi ${posisi} di ${nama_perusahaan}, yang saya ketahui dari ${sumber_lowongan}.

Data diri saya secara singkat:
Nama          : ${nama}
Jenis Kelamin : ${jenis_kelamin}
Tempat/Tanggal Lahir : ${tempat_lahir}, ${tanggal_lahir}
Alamat        : ${alamat}
No. Telepon   : ${telepon}
Email         : ${email}
Pendidikan    : ${pendidikan}

Saya tertarik untuk bergabung dengan ${nama_perusahaan} karena (silakan tambahkan alasan singkat, contoh: prospek pengembangan karier, budaya perusahaan, dan kesesuaian dengan latar belakang pendidikan). Saya siap bekerja dengan penuh tanggung jawab, disiplin, serta mampu berkolaborasi dengan tim.

Sebagai kelengkapan lamaran, saya lampirkan:
${lampiran}

Demikian surat lamaran kerja ini saya sampaikan. Saya berharap dapat mendapatkan kesempatan wawancara untuk menjelaskan lebih lanjut mengenai kompetensi dan motivasi saya. Terima kasih atas perhatian dan kesempatan yang diberikan.

Hormat saya,

${nama}
${telepon}
${email}`;

            document.getElementById('email-preview').textContent = body;
        }

        function copyEmail() {
            const emailText = document.getElementById('email-preview').textContent;
            navigator.clipboard.writeText(emailText).then(
                () => alert('Isi email lamaran berhasil disalin!'),
                () => alert('Gagal menyalin email.')
            );
        }

        function autoSaveDraft() {
            alert('Draft surat lamaran via email berhasil disimpan!');
        }

        function clearForm() {
            if (confirm('Reset semua isi form?')) {
                location.reload();
            }
        }

        // Inisialisasi
        window.onload = () => {
            updateEmail();
        };
    </script>
</body>
</html>j
