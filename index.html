<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Sistem Seleksi Kandidat Konfigurasi</title>

  <!-- PWA Meta -->
  <meta name="theme-color" content="#1e293b">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="HR Scanner">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='30' fill='%231e293b'/><text x='50' y='68' font-size='45' font-family='Arial,sans-serif' font-weight='900' fill='white' text-anchor='middle'>HR</text></svg>">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { slate: { 850: '#151e32', 900: '#0f172a' }, primary: { 500: '#2563eb', 600: '#1d4ed8' }, success: '#10b981', danger: '#ef4444' },
          fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
        }
      }
    }
  </script>

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>body{ -webkit-tap-highlight-color: transparent; } .scrollbar-hide::-webkit-scrollbar{display:none;}</style>
</head>
<body class="bg-slate-900 text-slate-200 font-sans h-screen flex flex-col overflow-hidden">

  <!-- HEADER -->
  <header class="bg-slate-800 border-b border-slate-700 z-50 px-6 py-4 flex justify-between items-center shadow-lg">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-slate-700 rounded-lg flex items-center justify-center text-white font-bold border border-slate-600">
        <i class="fas fa-cogs"></i>
      </div>
      <div>
        <h1 class="text-lg font-bold text-white tracking-tight">Analisis Kompetensi</h1>
        <p class="text-xs text-slate-400 font-medium">Engine Bobot Fleksibel</p>
      </div>
    </div>
    <div class="bg-slate-700 px-3 py-1 rounded border border-slate-600">
      <span class="text-[10px] font-bold text-slate-300 tracking-wider">V16.0 CONFIG</span>
    </div>
  </header>

  <!-- MAIN -->
  <main class="flex-1 overflow-y-auto scrollbar-hide p-6 relative">
    <div class="max-w-4xl mx-auto space-y-6">

      <!-- UPLOAD -->
      <div class="bg-slate-800 rounded-xl border border-slate-700 p-1 shadow-lg relative">
        <input type="file" id="pdfInput" accept="application/pdf" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-20">
        <div class="border-2 border-dashed border-slate-600 rounded-lg p-8 text-center" id="dropZone">
          <div class="mb-3"><i class="fas fa-file-pdf text-4xl text-slate-400"></i></div>
          <h3 class="text-white font-semibold mb-1">Unggah Dokumen CV</h3>
          <p class="text-slate-400 text-sm" id="fileName">Format: PDF</p>
        </div>
      </div>

      <!-- RESULT -->
      <div id="resultArea" class="hidden space-y-6">
        
        <!-- SCORE PANEL -->
        <div class="bg-slate-800 rounded-xl border border-slate-700 p-6 shadow-lg">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-white font-bold text-lg border-l-4 border-primary-600 pl-3">Hasil Evaluasi</h2>
            <div id="statusBadge" class="px-4 py-1 rounded text-sm font-bold bg-slate-700 text-slate-300">MENUNGGU</div>
          </div>
          
          <div class="flex items-center gap-6 mb-4">
            <div class="flex-1">
              <div class="text-slate-400 text-xs font-bold uppercase mb-1">Total Poin Kompetensi</div>
              <div class="text-5xl font-black text-white font-mono" id="scoreValue">0</div>
            </div>
            <div class="flex-1 h-3 bg-slate-700 rounded-full overflow-hidden">
              <div id="progressBar" class="h-full bg-slate-600 transition-all duration-1000 ease-out w-0"></div>
            </div>
          </div>
          
          <div class="grid grid-cols-2 gap-4 mb-4">
            <div class="bg-slate-700/30 p-3 rounded border border-slate-600">
              <div class="text-xl font-bold text-white" id="earnedPoints">0</div>
              <div class="text-[10px] uppercase text-slate-500 font-bold tracking-wider">Poin Diperoleh</div>
            </div>
            <div class="bg-slate-700/30 p-3 rounded border border-slate-600">
              <div class="text-xl font-bold text-slate-400" id="maxPoints">0</div>
              <div class="text-[10px] uppercase text-slate-500 font-bold tracking-wider">Poin Maksimal</div>
            </div>
          </div>

          <div id="finalVerdict" class="p-3 rounded bg-slate-700/50 text-sm text-slate-300 border border-slate-600">
            Sistem belum memproses dokumen.
          </div>
        </div>

        <!-- LOGS -->
        <div class="bg-slate-800 rounded-xl border border-slate-700 overflow-hidden">
          <div class="px-6 py-4 border-b border-slate-700 bg-slate-800/50">
            <h3 class="font-bold text-white">Rincian Pemindaian</h3>
          </div>
          <div class="max-h-[500px] overflow-y-auto scrollbar-hide" id="logList"></div>
        </div>

        <button onclick="resetApp()" class="w-full py-3 bg-slate-700 hover:bg-slate-600 text-white font-semibold rounded-lg border border-slate-600 transition-colors">
          Ulangi Analisis
        </button>
      </div>

    </div>
  </main>

  <!-- LOADER -->
  <div id="loader" class="fixed inset-0 bg-slate-900/95 backdrop-blur-sm z-50 hidden flex-col items-center justify-center">
    <div class="w-16 h-16 border-4 border-slate-700 border-t-primary-600 rounded-full animate-spin mb-4"></div>
    <h2 class="text-white font-bold text-lg">Menganalisis...</h2>
    <p class="text-slate-400 text-sm mt-1">Menghitung bobot kompetensi</p>
  </div>

  <script>
    // ==========================================
    // DATABASE KATA KUNCI & BOBOT (FLEKSIBEL)
    // ==========================================
    // Programmer dapat menambahkan keyword di sini.
    // Format: { id, keyword, weight (poin), category, synonyms }
    // Semakin tinggi 'weight', semakin besar pengaruhnya ke skor total.
    const keywordDatabase = [
      // --- PENDIDIKAN (BOBOT TINGGI) ---
      { id: 1, keyword: "S1", weight: 50, category: "Pendidikan", synonyms: ["sarjana", "bachelor", "strata 1", "gelar", "universitas"] },
      { id: 2, keyword: "S2", weight: 30, category: "Pendidikan", synonyms: ["magister", "master", "strata 2", "s-2"] },
      { id: 3, keyword: "S3", weight: 50, category: "Pendidikan", synonyms: ["doktor", "phd", "doctor"] },
      
      // --- BAHASA (BOBOT TINGGI) ---
      { id: 4, keyword: "Bahasa Inggris", weight: 40, category: "Bahasa", synonyms: ["english", "toefl", "ielts", "inggris"] },
      { id: 5, keyword: "Mandarin", weight: 30, category: "Bahasa", synonyms: ["cina", "chinese", "hanyu"] },

      // --- PENGALAMAN (BOBOT TINGGI) ---
      { id: 6, keyword: "Pengalaman Kerja", weight: 50, category: "Pengalaman", synonyms: ["work experience", "employment", "pekerjaan", "history"] },
      { id: 7, keyword: "Freelance", weight: 20, category: "Pengalaman", synonyms: ["project", "lepas", "mandiri"] },

      // --- IT & TEKNOLOGI (BOBOT MENENGAH) ---
      { id: 8, keyword: "Javascript", weight: 25, category: "Teknologi", synonyms: ["js", "nodejs", "react", "vue", "angular"] },
      { id: 9, keyword: "PHP", weight: 20, category: "Teknologi", synonyms: ["laravel", "codeigniter", "backend"] },
      { id: 10, keyword: "Python", weight: 25, category: "Teknologi", synonyms: ["django", "flask", "data science"] },
      { id: 11, keyword: "UI/UX", weight: 20, category: "Teknologi", synonyms: ["design", "figma", "sketch", "interface"] },
      { id: 12, keyword: "Database", weight: 20, category: "Teknologi", synonyms: ["mysql", "sql", "oracle", "mongo"] },

      // --- ADMIN & FINANCE (BOBOT MENENGAH) ---
      { id: 13, keyword: "Microsoft Office", weight: 20, category: "Administrasi", synonyms: ["excel", "word", "powerpoint", "ppt"] },
      { id: 14, keyword: "Akuntansi", weight: 25, category: "Administrasi", synonyms: ["accounting", "keuangan", "pajak", "laporan"] },
      
      // --- DESAIN & KREATIF (BOBOT MENENGAH) ---
      { id: 15, keyword: "Adobe Photoshop", weight: 15, category: "Kreatif", synonyms: ["photoshop", "edit foto", "image"] },
      { id: 16, keyword: "Video Editing", weight: 15, category: "Kreatif", synonyms: ["premiere", "after effect", "filmora"] },

      // --- MARKETING & SALES (BOBOT MENENGAH) ---
      { id: 17, keyword: "Digital Marketing", weight: 25, category: "Pemasaran", synonyms: ["seo", "sem", "fb ads", "google ads"] },
      { id: 18, keyword: "Public Speaking", weight: 20, category: "Pemasaran", synonyms: ["presentasi", "mc", "host"] },

      // --- TAMBAHKAN KEYWORD BARU DI BAWAH INI ---
      // { id: 99, keyword: "Nama Skill Baru", weight: 20, category: "Kategori", synonyms: ["sinonim1", "sinonim2"] }
    ];

    // --- ENGINE VARIABLES ---
    let rawText = "";
    const pdfInput = document.getElementById('pdfInput');
    const loader = document.getElementById('loader');
    const resultArea = document.getElementById('resultArea');
    const logList = document.getElementById('logList');

    // --- PDF HANDLER ---
    pdfInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if(!file) return;

      document.getElementById('fileName').innerText = `Memproses: ${file.name}`;
      loader.classList.remove('hidden');
      loader.classList.add('flex');

      try {
        const buffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({data: buffer}).promise;
        let text = "";
        
        for(let i=1; i<=pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const content = await page.getTextContent();
          text += content.items.map(item => item.str).join(" ");
        }

        rawText = text.toLowerCase().replace(/[\n\r\t]+/g, ' ').replace(/[^\w\s\-\.\@]/g, '').replace(/\s+/g, ' ').trim();

        setTimeout(() => {
          loader.classList.add('hidden');
          loader.classList.remove('flex');
          analyzeDocument();
        }, 1000);

      } catch (err) {
        alert("Gagal membaca PDF.");
        loader.classList.add('hidden');
      }
    });

    // --- ANALYSIS ENGINE (BERDASARKAN BOBOT) ---
    function analyzeDocument() {
      resultArea.classList.remove('hidden');
      logList.innerHTML = "";

      let totalPoinMaksimal = 0;
      let totalPoinDiperoleh = 0;
      let matchCount = 0;

      keywordDatabase.forEach(k => {
        totalPoinMaksimal += k.weight; // Tambahkan bobot ke max score

        let found = false;
        let method = "Tepat";
        const key = k.keyword.toLowerCase();

        // Cek Kata Kunci Utama
        if(rawText.includes(key)) {
          found = true;
        }
        // Cek Sinonim
        else if(k.synonyms) {
          if(k.synonyms.some(s => rawText.includes(s))) {
            found = true;
            method = "Sinonim";
          }
        }

        // RENDER LOG
        if(found) {
          totalPoinDiperoleh += k.weight;
          matchCount++;
          logList.innerHTML += `
            <div class="p-4 flex justify-between items-center bg-green-500/5 hover:bg-slate-700/30 border-b border-slate-700">
              <div>
                <div class="text-white font-bold text-sm">${k.keyword}</div>
                <div class="text-xs text-slate-400">${k.category}</div>
              </div>
              <div class="text-right">
                <div class="text-sm font-bold text-green-400">+${k.weight} Poin</div>
                <div class="text-[10px] text-slate-500">${method}</div>
              </div>
            </div>
          `;
        } else {
          // Tampilkan keyword yang tidak ditemukan (Opsional: jika ingin semua muncul, hapus if dibawah)
          // Disini kita tampilkan semua agar user tahu apa yang hilang
          logList.innerHTML += `
            <div class="p-4 flex justify-between items-center opacity-40 hover:bg-slate-700/30 border-b border-slate-700">
              <div>
                <div class="text-slate-400 font-medium text-sm">${k.keyword}</div>
                <div class="text-xs text-slate-500">${k.category}</div>
              </div>
              <div class="text-right">
                <div class="text-sm font-medium text-slate-500">0 Poin</div>
                <div class="text-[10px] text-slate-600">Tidak Ditemukan</div>
              </div>
            </div>
          `;
        }
      });

      // --- HITUNG SKOR AKHIR ---
      // Skor = (Poin Diperoleh / Poin Maksimal) * 100
      let finalScore = 0;
      if(totalPoinMaksimal > 0) {
        finalScore = Math.round((totalPoinDiperoleh / totalPoinMaksimal) * 100);
      }

      // --- UPDATE UI ---
      document.getElementById('scoreValue').innerText = finalScore;
      document.getElementById('earnedPoints').innerText = totalPoinDiperoleh;
      document.getElementById('maxPoints').innerText = totalPoinMaksimal;
      
      const bar = document.getElementById('progressBar');
      bar.style.width = finalScore + "%";
      
      // Warna & Keputusan
      let color = "";
      let status = "";
      let verdict = "";

      if(finalScore >= 80) {
        color = "bg-green-500"; status = "SANGAT KOMPETEN"; verdict = "Kandidat memenuhi mayoritas kriteria dengan bobot kompetensi yang sangat baik.";
      } else if(finalScore >= 60) {
        color = "bg-blue-500"; status = "KOMPETEN"; verdict = "Kandidat memenuhi standar kualifikasi yang ditetapkan.";
      } else if(finalScore >= 40) {
        color = "bg-yellow-500"; status = "CUKUP KOMPETEN"; verdict = "Kandidat memiliki beberapa kompetensi, namun masih kurang pada poin krusial.";
      } else {
        color = "bg-red-500"; status = "KURANG KOMPETEN"; verdict = "Kandidat belum memenuhi standar kompetensi minimum.";
      }

      bar.className = `h-full transition-all duration-1000 ease-out ${color}`;
      
      document.getElementById('statusBadge').innerText = status;
      document.getElementById('statusBadge').className = `px-4 py-1 rounded text-sm font-bold border ${color === 'bg-red-500' ? 'bg-red-500/10 border-red-500 text-red-400' : (color === 'bg-green-500' ? 'bg-green-500/10 border-green-500 text-green-400' : 'bg-blue-500/10 border-blue-500 text-blue-400')}`;
      
      document.getElementById('finalVerdict').innerHTML = `<span class="${color === 'bg-red-500' ? 'text-red-400' : 'text-blue-400'} font-bold">${verdict}</span>`;
    }

    function resetApp() {
      pdfInput.value = '';
      rawText = '';
      resultArea.classList.add('hidden');
      document.getElementById('fileName').innerText = "Format: PDF";
    }
  </script>
</body>
</html>
